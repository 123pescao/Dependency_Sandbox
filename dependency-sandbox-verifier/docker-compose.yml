# LOCAL DEVELOPMENT ONLY — do not expose this configuration to the internet.
# Credentials below are defaults for local dev. Use a secrets manager or
# environment variable substitution for any non-local deployment.
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dsv
      POSTGRES_USER: dsv_user
      # Change this password before deploying outside localhost.
      POSTGRES_PASSWORD: dsv_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsv_user -d dsv"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:latest-rootless
    command:
      - "run"
      - "--server"
      - "--log-format=json"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro

volumes:
  postgres_data:
  redis_data:
